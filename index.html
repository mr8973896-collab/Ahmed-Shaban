<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ahmed Shaban Digital Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    html, body { scrollbar-width: none; -ms-overflow-style: none; }

    body {
      font-family: 'Almarai', sans-serif;
      background: linear-gradient(135deg, #000010, #03008a 60%, #000);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      color: #fff;
      padding: 30px 15px 60px;
      position: relative;
      user-select: none;
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 70%);
      z-index: -1;
      animation: bgMove 15s infinite linear;
    }

    @keyframes bgMove {
      0% { transform: translate(-50%, -50%); }
      100% { transform: translate(-25%, -25%); }
    }

    /* شاشة الشرف */
    .honor-popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.94);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99;
      opacity: 1;
      transition: opacity 1.5s ease;
      padding: 20px;
    }

    .honor-popup.hide {
      opacity: 0;
      pointer-events: none;
    }

    .honor-content {
      background: linear-gradient(135deg, #0500aa, #0a0a0a);
      padding: clamp(25px, 6vw, 40px);
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,255,255,0.6), 0 0 80px rgba(0,255,255,0.25);
      animation: honorFade 1.8s ease-in-out;
      max-width: 600px;
      width: 95%;
    }

    @keyframes honorFade {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .honor-content h2 {
      font-size: clamp(24px, 5vw, 30px);
      margin-bottom: 25px;
      color: #00ffff;
      text-shadow: 0 0 15px rgba(0,255,255,0.4);
    }

    .person {
      margin: 18px 0;
      font-size: clamp(16px, 4vw, 19px);
      font-weight: bold;
      color: #fff;
    }

    .person span {
      display: block;
      font-size: clamp(13px, 3.5vw, 15px);
      font-weight: normal;
      color: #ccc;
      margin-top: 4px;
    }

    /* الكارت الرئيسي */
    .card {
      background: rgba(255, 255, 255, 0.06);
      padding: clamp(20px, 5vw, 30px);
      border-radius: 20px;
      box-shadow: 0 12px 40px rgba(0, 255, 255, 0.25);
      backdrop-filter: blur(20px) saturate(180%);
      width: 90%;
      max-width: 420px;
      text-align: center;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      margin: 30px 0;
      z-index: 1;
      border: 1px solid rgba(0,255,255,0.15);
    }

    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    .card img {
      width: clamp(130px, 38vw, 190px);
      height: clamp(130px, 38vw, 190px);
      border-radius: 50%;
      margin-bottom: 20px;
      border: 4px solid #00ffff;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.7);
      object-fit: cover;
      object-position: center 55%;
    }

    .card h1 {
      font-size: clamp(22px, 5.5vw, 28px);
      font-weight: 600;
      color: #00ffff;
      margin: 8px 0 5px;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }

    .card p {
      font-size: clamp(14px, 4vw, 17px);
      color: #ccc;
      margin-bottom: 28px;
    }

    /* الأيقونات */
    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 25px;
      width: 100%;
    }

    .links a {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 88%;
      max-width: 320px;
      height: clamp(52px, 12vw, 62px);
      background: rgba(255, 255, 255, 0.05);
      color: #00ffff;
      font-size: clamp(26px, 7vw, 32px);
      border-radius: 16px;
      text-decoration: none;
      border: 2px solid rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.25);
      opacity: 0;
      transform: translateY(30px);
      transition: background 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .links a.show {
      animation: iconUp 0.7s forwards ease-out;
    }

    @keyframes iconUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* تأثير الضوء والـ hover - فقط على الأجهزة التي تدعم hover (ديسكتوب) */
    @media (hover: hover) {
      .links a::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(120deg, transparent, rgba(0,255,255,0.35), transparent);
        transition: all 0.5s ease;
        pointer-events: none;
      }

      .links a:hover::after {
        left: 100%;
      }

      .links a:hover {
        background: rgba(0, 255, 255, 0.22);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        border-color: #00ffff;
        transform: translateY(-4px) scale(1.04);
      }
    }

    /* زر التحميل */
    .download-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 14px 28px;
      background: rgba(0, 255, 255, 0.15);
      color: #00ffff;
      text-decoration: none;
      border-radius: 14px;
      font-size: clamp(15px, 4vw, 18px);
      border: 2px solid rgba(0, 255, 255, 0.4);
      transition: all 0.35s ease;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(0,255,255,0.2);
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    @media (hover: hover) {
      .download-btn:hover {
        background: rgba(0, 255, 255, 0.3);
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.7);
        transform: translateY(-4px);
      }
    }
  </style>
</head>
<body>

  <!-- شاشة الشرف -->
  <div class="honor-popup" id="honorPopup">
    <div class="honor-content">
      <h2>Honor Board</h2>
      <div class="person">
        Muhammed Rabie
        <span>Founder & CEO</span>
      </div>
      <div class="person">
        Ahmed Waleed El Saber
        <span>Co-Founder & Investor</span>
      </div>
    </div>
  </div>

  <!-- الكارت الرئيسي -->
  <div class="card" id="mainCard">
    <img src="1.png" alt="Ahmed Shaban">
    <h1>Ahmed Shaban</h1>
    <p>High School Student</p>

    <div class="links">
      <!-- WhatsApp -->
      <a href="https://wa.me/201153590433" target="_blank">
        <i class="fab fa-whatsapp"></i>
      </a>

      <!-- Instagram -->
      <a href="https://www.instagram.com/tymtahmdshban?igsh=a2xreGxucm80MzV3" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>

      <!-- Facebook -->
      <a href="https://www.facebook.com/share/p/1FSNgBeNCt/" target="_blank">
        <i class="fab fa-facebook"></i>
      </a>

      <!-- Telegram -->
      <a href="https://t.me/+201153590433" target="_blank">
        <i class="fab fa-telegram"></i>
      </a>

      <!-- TikTok -->
      <a href="https://www.tiktok.com/@ahmed.shaban694?_r=1&_t=ZS-94p0MEFt6zh" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>

      <!-- Phone Call -->
      <a href="tel:+201153590433">
        <i class="fas fa-phone"></i>
      </a>
    </div>

    <a class="download-btn" id="downloadQR">Download Link</a>
  </div>

  <script>
    const honorPopup = document.getElementById("honorPopup");
    const card = document.getElementById("mainCard");
    const icons = document.querySelectorAll(".links a");

    function showCard() {
      honorPopup.style.display = "none";
      card.classList.add("show");
      icons.forEach((icon, i) => {
        setTimeout(() => icon.classList.add("show"), i * 160);
      });
    }

    // إخفاء شاشة الشرف بعد 3 ثواني
    setTimeout(() => {
      honorPopup.classList.add("hide");
      setTimeout(showCard, 1000);
    }, 3000);

    // إغلاق شاشة الشرف بالضغط عليها
    honorPopup.addEventListener("click", () => {
      honorPopup.classList.add("hide");
      setTimeout(showCard, 1500);
    });

    // تحميل الرابط كنص
    document.getElementById("downloadQR").addEventListener("click", e => {
      e.preventDefault();
      const pageUrl = window.location.href;
      const blob = new Blob([pageUrl], { type: "text/plain;charset=utf-8" });
      saveAs(blob, "Ahmed-Shaban-Card.txt");
    });
  </script>
</body>
</html>
